<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Perfil</title>

</head>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    background:#f5f7fa;
    color:#333;
}

/* ===========================
   CABEÇALHO
=========================== */
header{
    width:100%;
    height:80px;
    background:linear-gradient(
        135deg,
        #081c3d 0%,
        #1e5eff 45%,
        #b46cff 100%
    );
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 5px 0;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
    position:sticky;
    top:0;
    z-index:999;
}

header img{
    height: 40px;
    width: auto;
    mix-blend-mode: screen;
}

nav{
    display:flex;
    gap:35px;
    margin: auto;
}


nav a{
    color:white;
    text-decoration:none;
    font-weight:600;
    font-size:18px;
    transition:.3s;
    position:relative;
}


nav a::after{
    content:"";
    position:absolute;
    width:0%;
    height:3px;
    left:0;
    bottom:-5px;
    background:white;
    transition:.3s;
}


nav a:hover::after{
    width:100%;
}

nav a.ativo{
    color:#ffffff;
}

nav a.ativo::after{
    content:"";
    width:100%;
    height:2px;
    background:#fbfbfb;
    position:absolute;
    left:0;
    bottom:-10px;
    border-radius:5px;
}
/* ===========================
   CAPA
=========================== */

.capa{
    width:100%;
    height:320px;
    overflow:hidden;
    background:#ddd;
}

.capa img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ===========================
   PERFIL
=========================== */

.perfil{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

.perfil-topo{
    display:flex;
    align-items:center;
    gap:40px;
    margin-top:-120px;
    margin-bottom:40px;
}

/* FOTO */

.foto-perfil{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:8px solid white;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

/* INFORMAÇÕES */

.informacoes{
    flex:1;
}

.informacoes h1{
    font-size:36px;
    color:#222;
    margin-bottom:15px;
}

.informacoes p{
    font-size:17px;
    line-height:1.7;
    color:#666;
    margin-bottom:20px;
}

.localizacao{
    color:#777;
    font-size:15px;
    margin-bottom:20px;
}

/* REDES */

.redes{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.redes a{
    text-decoration:none;
    background:#6c63ff;
    color:white;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
    font-weight:600;
}

.redes a:hover{
    background:#4d45d6;
}

/* ===========================
   ESTATÍSTICAS
=========================== */

.estatisticas{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    margin:50px 0;
}

.card{
    background:white;
    border-radius:18px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#6c63ff;
    font-size:42px;
    margin-bottom:10px;
}

.card p{
    color:#666;
    font-size:18px;
}

/* ===========================
   BOTÃO
=========================== */

.acoes{
    display:flex;
    gap: 20;
    justify-content:center;
    margin-bottom:50px;
    gap: 20px;
}

.btn-editar{
    background:#6c63ff;
    color:white;
    text-decoration:none;
    padding:15px 40px;
    border-radius:40px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn-editar:hover{
    background:#5148d7;
    transform:scale(1.05);
}

/* ===========================
   OBRAS
=========================== */

.obras h2{
    margin-bottom:30px;
    color:#333;
    font-size:30px;
}

/* GRID */

.grid-obras{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

/* Cada obra criada pelo JavaScript */

.obra-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.obra-card:hover{
    transform:translateY(-6px);
}

.obra-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.obra-card .conteudo{
    padding:20px;
}

.obra-card h3{
    margin-bottom:10px;
    color:#333;
}

.obra-card p{
    color:#777;
    line-height:1.6;
}

/* ===========================
   RESPONSIVO
=========================== */

@media(max-width:430px){

header{
        flex-direction:column;
        gap:20px;
    }

nav{

    margin-top:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.perfil-topo{

    flex-direction:column;
    text-align:center;
    margin-top:-80px;
}

.foto-perfil{

    width:180px;
    height:180px;
}

.estatisticas{

    grid-template-columns:1fr;
}

.redes{

    justify-content:center;
}

}

@media(max-width:600px) {

.perfil{

    padding:20px;
}

.informacoes h1{

    font-size:28px;
}

.capa{

    height:220px;
}

.card h2{

    font-size:34px;
}

.btn-editar{

    width:100%;
    text-align:center;
}

}

</style>

<body>
    <!-- CABEÇALHO -->
    <header>
     <a href="Home.html">
        <img src="1.png" alt="Logo da sua empresa">
     </a>

        <nav>

            <a href="Home.html">Início</a>
            <a href="Galeria.html">Galeria</a>
            <a href="Perfil.html"class="ativo">Perfil</a>

        </nav>

    <section class="capa">

        <img

                    Nome do Usuário

                <p id="biografia">

                </p>

                <div class="localizacao">

                    <span id="cidade">Cidade</span>

                    •

                    <span id="pais">País</span>

                </div>


                <div class="redes">

                    <a
                        id="instagram"
                        href="#"
                        target="_blank">

                        Instagram

                    </a>

                    <a
                        id="site"
                        href="#"
                        target="_blank">

                        Site

                    </a>

                </div>

            </div>

        </section>

        <!-- ===== ESTATÍSTICAS ===== -->
        <section class="estatisticas">

            <div class="card">

                <h2 id="quantidadeObras">

                    0

                </h2>

                <p>

                </p>

            </div>

            <div class="card">

                <h2 id="seguidores">

                    0

                </h2>

                <p>

                    Seguidores

                </p>

            </div>

            <div class="card">

                <h2 id="seguindo">

                    0

                </h2>

                <p>

                    Seguindo

                </p>

            </div>

        </section>

        <!-- ===== BOTÃO ===== -->
        <section class="acoes">

            <a
                href="Perfil-edit.html"
                class="btn-editar">

                Editar Perfil

            </a>

             <a
                href="Painel-estatisticas.html"
                class="btn-editar">

                Meu Painel

            </a>

        </section>

        <!-- ===== OBRAS PUBLICADAS ===== -->
        <section class="obras">

            <h2>

                Obras Publicadas

            </h2>
            
            <a
                href="Opções-criar.html"
                class="btn-editar">

                Criar +

            </a>

            <div id="listaObras" class="grid-obras">

                <!--

                O JavaScript irá inserir
                automaticamente as obras
                do usuário aqui.

                -->

            </div>

        </section>

    <!-- JavaScript -->
    <script src="js/supabase.js"></script>

    <script src="js/perfil.js"></script>

</body>

</html>
