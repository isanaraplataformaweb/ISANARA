<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes das Obras</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        header {
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, #081c3d 0%, #1e5eff 45%, #b46cff 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            box-shadow: 0 3px 10px rgba(0,0,0,.08);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        header img {
            height: 40px;
            width: auto;
            mix-blend-mode: screen;
            margin-left: 20px;
        }
        nav {
            display: flex;
            gap: 35px;
            margin: auto;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            transition: .3s;
            position: relative;
        }
        nav a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 3px;
            left: 0;
            bottom: -5px;
            background: white;
            transition: .3s;
        }
        nav a:hover::after {
            width: 100%;
        }
        nav a.ativo {
            color: #ffffff;
        }
        nav a.ativo::after {
            content: "";
            width: 100%;
            height: 2px;
            background: #fbfbfb;
            position: absolute;
            left: 0;
            bottom: -10px;
            border-radius: 5px;
        }

        /* =========================== DETALHES DA OBRA =========================== */
        .container-obra {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        /* Lado Esquerdo: Imagem da Obra */
        .visualizacao-arte {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,.05);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000; /* Fundo preto realça imagens de arte */
        }
        .visualizacao-arte img {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        /* Lado Direito: Informações Textuais */
        .info-detalhes {
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .bloco-texto h1 {
            font-size: 28px;
            color: #222;
            margin-bottom: 15px;
        }
        .bloco-texto .data-publicacao {
            font-size: 13px;
            color: #999;
            margin-bottom: 20px;
            display: block;
        }
        .bloco-texto .descricao-texto {
            font-size: 16px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 30px;
        }

        /* Bloco do Artista Criador */
        .cartao-artista {
            border-top: 1px solid #eee;
            padding-top: 25px;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .cartao-artista img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #6c63ff;
        }
        .cartao-artista .meta-artista p {
            font-size: 13px;
            color: #888;
        }
        .cartao-artista .meta-artista h4 {
            font-size: 16px;
            color: #333;
        }

        /* Botão Voltar */
        .btn-voltar {
            display: inline-block;
            text-align: center;
            background: #6c63ff;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: bold;
            transition: .3s;
            width: 100%;
        }
        .btn-voltar:hover {
            background: #5148d7;
        }

        /* Mensagem de Erro ou Carregando */
        .status-mensagem {
            text-align: center;
            font-size: 18px;
            color: #777;
            padding: 100px 20px;
            grid-column: 1 / -1;
        }

        /* =========================== RESPONSIVO =========================== */
        @media(max-width: 800px) {
            .container-obra {
                grid-template-columns: 1fr;
                gap: 25px;
                margin: 20px auto;
            }
            header {
                flex-direction: column;
                gap: 20px;
                height: auto;
                padding: 15px 0;
            }
            nav {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- CABEÇALHO -->
    <header>
        <a href="Home.html">

        <nav>
